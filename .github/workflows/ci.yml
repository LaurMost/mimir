name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Black format check
        run: uv run black --check src tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run pytest
        run: uv run pytest -v --tb=short

  integration:
    name: Integration (Qdrant)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:6333/healthz && break
            sleep 1
          done

      - name: Run integration smoke (collection lifecycle)
        env:
          MIMIR_QDRANT_URL: http://localhost:6333
          MIMIR_COLLECTION: ci_smoke
        run: |
          mkdir -p notes
          echo "# Hello CI" > notes/hello.md
          echo "This is a test note about avellaneda-stoikov market making." >> notes/hello.md
          uv run mimir status
          uv run mimir ingest notes
          uv run mimir status
          uv run mimir query "market making" --k 1
          uv run mimir reset --yes
