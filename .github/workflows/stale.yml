name: Stale

on:
  schedule:
    # Daily at 06:30 UTC
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 30
          stale-issue-label: "wontfix"
          stale-pr-label: "wontfix"
          exempt-issue-labels: "bug,security,blocked,in-progress"
          exempt-pr-labels: "bug,security,blocked,in-progress"
          stale-issue-message: >
            This issue has had no activity for 60 days and is now marked stale.
            It will be closed in 30 days if there is no further activity. Remove
            the stale label or comment to keep it open.
          stale-pr-message: >
            This pull request has had no activity for 60 days and is now marked
            stale. It will be closed in 30 days if there is no further activity.
            Remove the stale label or comment to keep it open.
          close-issue-message: >
            Closing as stale after 90 days of inactivity. Feel free to reopen if
            this is still relevant.
          close-pr-message: >
            Closing as stale after 90 days of inactivity. Feel free to reopen if
            you'd like to continue this work.
