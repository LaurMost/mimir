name: Docs

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the site changes.
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/mimir/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Needed for `mkdocs gh-deploy` to push to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    env:
      # Enables the `social` plugin (link-preview cards) in mkdocs.yml.
      CI: "true"
    steps:
      - uses: actions/checkout@v7
        with:
          # git-revision-date-localized needs full history for accurate dates.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      # The `social` plugin renders cards with Cairo + Pillow, which need these
      # system libraries.
      - name: Install image toolchain (for social cards)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev libfreetype6-dev libffi-dev \
            libjpeg-dev libpng-dev libz-dev pngquant

      - name: Install docs dependencies
        run: uv sync --extra docs

      # Cache the generated social cards between runs to speed up builds.
      - name: Cache mkdocs-material build artifacts
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ github.sha }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Build (strict)
        run: uv run mkdocs build --strict

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force
